<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSIT 3-B Student Grading System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-black text-white p-4 text-center text-xl font-bold">
BSIT 3-B Student Grading System
</header>

<div class="max-w-4xl mx-auto mt-8 bg-white p-6 rounded shadow">

<h2 class="text-xl font-semibold mb-4 text-black">
Student Grade Entry Dashboard
</h2>

<form id="grade-form" class="space-y-4">

<input id="student-name" type="text" placeholder="Student Name"
class="border-2 border-gray-400 p-2 w-full rounded focus:outline-none focus:border-black" required>

<div id="phase1-subjects" class="grid grid-cols-2 gap-2">

<input id="subject1-name" placeholder="Subject 1 Name" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="subject2-name" placeholder="Subject 2 Name" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="subject3-name" placeholder="Subject 3 Name" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="subject4-name" placeholder="Subject 4 Name" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="subject5-name" placeholder="Subject 5 Name" class="border-2 border-gray-400 p-2 rounded focus:border-black">

</div>

<button id="save-subjects-button"
class="bg-black hover:bg-gray-800 text-white px-4 py-2 rounded w-full">
Save Subjects
</button>

<div id="phase2-grades" class="hidden grid grid-cols-2 gap-2">

<input id="grade1" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="grade2" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="grade3" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="grade4" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-gray-400 p-2 rounded focus:border-black">
<input id="grade5" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-gray-400 p-2 rounded focus:border-black">

</div>

<button id="submit-button" type="submit"
class="bg-black hover:bg-gray-800 text-white px-4 py-2 rounded w-full hidden">
Calculate Average
</button>

</form>

<p id="average-display" class="text-lg font-bold mt-4 text-black hidden"></p>
<p id="status-message" class="text-sm mt-2 text-gray-700"></p>

</div>

<!-- STUDENT HISTORY -->

<div class="max-w-4xl mx-auto mt-6 bg-white p-6 rounded shadow">

<h2 class="text-lg font-semibold mb-4 text-black">
Student Records
</h2>

<table class="w-full border text-center">

<thead class="bg-gray-200">

<tr>

<th class="border p-2">Student</th>

<th class="border p-2" id="th-sub1">Subject 1</th>
<th class="border p-2" id="th-sub2">Subject 2</th>
<th class="border p-2" id="th-sub3">Subject 3</th>
<th class="border p-2" id="th-sub4">Subject 4</th>
<th class="border p-2" id="th-sub5">Subject 5</th>

<th class="border p-2">Average</th>

</tr>

</thead>

<tbody id="student-history">

<tr>
<td colspan="7">No records yet</td>
</tr>

</tbody>

</table>

</div>

<footer class="mt-10 bg-black text-white text-center p-3 text-sm">
© Student Grading System
</footer>

<script src="app.js"></script>

</body>
</html>
